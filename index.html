<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoFIFA Community Engine</title>
    <style>
        :root {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --bg-darker: #0b0f19;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent: #10b981; 
            --border-color: #334155;
            
            --rating-elite: #2563eb; 
            --rating-great: #16a34a; 
            --rating-mid: #d97706;   
            --rating-low: #dc2626;   
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-main);
            margin: 0;
            padding: 0;
            color: var(--text-primary);
        }

        nav {
            background-color: var(--bg-card);
            border-bottom: 1px solid var(--border-color);
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        nav .logo {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--text-primary);
        }
        nav .logo span { color: var(--accent); }
        
        nav .nav-links button {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1rem;
            font-weight: 600;
            margin-left: 15px;
            cursor: pointer;
            padding: 8px 16px;
            border-radius: 6px;
        }
        nav .nav-links button.active {
            color: #fff;
            background-color: var(--bg-main);
        }

        .container {
            max-width: 1300px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .page-section { display: none; }
        .page-section.active-section { display: block; }

        .controls-row {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }
        select, input {
            background-color: var(--bg-card);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            padding: 10px 15px;
            border-radius: 6px;
            font-size: 0.95rem;
            outline: none;
        }
        input { flex-grow: 1; }

        /* Finance Board Layout */
        .finance-board {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }
        .finance-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.2);
        }
        .finance-card h4 {
            margin: 0 0 5px 0;
            color: var(--text-secondary);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .finance-card .amount {
            font-size: 1.4rem;
            font-weight: 700;
            color: #fff;
        }
        .finance-card .amount.wage { color: #38bdf8; }
        .finance-card .amount.transfer { color: #34d399; }

        .sofifa-table-container {
            background-color: var(--bg-card);
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3);
        }
        .sofifa-table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 0.95rem;
        }
        .sofifa-table th, .sofifa-table td {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-color);
        }
        .sofifa-table th {
            background-color: var(--bg-darker);
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
        }
        .sofifa-table tr:hover {
            background-color: #243249;
        }

        .player-name-cell {
            font-weight: bold;
            color: #fff;
        }
        .player-team-sub {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 2px;
        }
        .pos-badge {
            background-color: #334155;
            color: #38bdf8;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
        }

        .rating-badge {
            display: inline-block;
            font-weight: bold;
            color: #fff;
            padding: 4px 8px;
            border-radius: 4px;
            text-align: center;
            min-width: 25px;
        }
        .ovr-90 { background-color: var(--rating-elite); }
        .ovr-80 { background-color: var(--rating-great); }
        .ovr-70 { background-color: var(--rating-mid); }
        .ovr-low { background-color: var(--rating-low); }

        .value-text { color: #34d399; font-weight: 600; }
    </style>
</head>

    <nav>
        <div class="logo">So<span>FIFA</span> Roleplay</div>

            <div class="sofifa-table-container">

                            <th>Foot</th>
                            <th>Value</th>
                        </tr>
                    </thead>
                    <tbody id="playerTableBody">

                </table>
            </div>
        </section>

            </div>
        </section>

        function getRatingClass(rating) {
            if (rating >= 90) return 'ovr-90';
            if (rating >= 80) return 'ovr-80';
            if (rating >= 70) return 'ovr-70';
            return 'ovr-low';
        }

        function updateFinanceDisplay(team) {
            const board = document.getElementById('financeBoard');
            if (team === 'ALL') {
                board.style.display = 'none';
                return;
            }
            
            const data = clubFinances[team];
            if (data) {
                document.getElementById('financeTeamName').innerText = team;
                document.getElementById('transferBudgetDisplay').innerText = data.transfer;
                document.getElementById('wageBudgetDisplay').innerText = data.wage;
                board.style.display = 'grid';
            } else {
                board.style.display = 'none';
            }
        }

        function renderPlayers(list) {
            const tbody = document.getElementById('playerTableBody');
            tbody.innerHTML = '';
            list.forEach(p => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td class="player-name-cell">
                        <div>${p.name}</div>
                        <div class="player-team-sub"><span class="pos-badge">${p.position}</span></div>
                    </td>
                    <td>${p.age}</td>
                    <td><span class="rating-badge ${getRatingClass(p.ovr)}">${p.ovr}</span></td>
                    <td><span class="rating-badge ${getRatingClass(p.pot)}">${p.pot}</span></td>
                    <td>${p.team}</td>
                    <td>${p.foot}</td>
                    <td class="value-text">${p.value}</td>
                `;
                tbody.appendChild(row);
            });
        }

        function renderTransfers() {
            const tbody = document.getElementById('transferTableBody');
            tbody.innerHTML = '';
            transferFeed.forEach(t => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td class="player-name-cell">${t.name}</td>
                    <td>${t.from}</td>
                    <td>${t.to}</td>
                    <td><span class="rating-badge ${getRatingClass(t.ovr)}">${t.ovr}</span></td>
                    <td class="value-text">${t.fee}</td>
                `;
                tbody.appendChild(row);
            });
        }

        function filterPlayers() {
            const selectedTeam = document.getElementById('teamFilter').value;
            const searchKeyword = document.getElementById('searchFilter').value.toLowerCase();

            updateFinanceDisplay(selectedTeam);

            const filtered = playerDatabase.filter(p => {
                const matchesTeam = (selectedTeam === 'ALL' || p.team === selectedTeam);
                const matchesSearch = p.name.toLowerCase().includes(searchKeyword) || 
                                      p.position.toLowerCase().includes(searchKeyword) ||
                                      p.foot.toLowerCase().includes(searchKeyword);
                return matchesTeam && matchesSearch;
            });
            renderPlayers(filtered);
        }

        function switchTab(tabId, btn) {
            document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active-section'));
            document.querySelectorAll('.nav-links button').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active-section');
            btn.classList.add('active');
        }

        // Run baseline setup
        renderPlayers(playerDatabase);
        renderTransfers();
